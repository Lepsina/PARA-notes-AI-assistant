# Path to the root of your Obsidian vault (Windows path example)
vault_root: "C:/Users/YOUR_USERNAME/Documents/Obsidian Vault"

# File extensions to process
include_extensions:
  - .md

# Paths to exclude (relative to vault_root).
# Files/directories that start with any of these prefixes are skipped.
exclude_paths:
  - Resources/
  - Templates/
  - Files/
  - Excalidraw/
  - .obsidian/

# Priority weights for each top-level folder (used for batch ordering, future feature)
path_priority:
  Daily: 1.0
  Buffer: 0.9
  Projects: 0.9
  Areas: 0.8
  Archive: 0.2

# Date format used in notes and filenames
date_format: "%Y-%m-%d"

# Path to the SQLite full-text search index file.
# Leave commented out to use the platform default:
#   Windows: %LOCALAPPDATA%\obsassist\index.sqlite
#   Linux/macOS: ~/.local/share/obsassist/index.sqlite
# index_path: "C:/Users/YOUR_USERNAME/AppData/Local/obsassist/index.sqlite"

# Ollama server settings (for analyze / ask commands)
ollama:
  base_url: "http://127.0.0.1:11434"
  model: "llama3:8b"
  temperature: 0.2

# Strict metadata command settings
# The metadata command updates ONLY the YAML frontmatter; the markdown body
# is never modified.  LLM output is validated against the schema allowlist
# before writing.
metadata:
  # Lightweight model dedicated to metadata tasks.
  # Falls back to ollama.model when not set.
  model: "qwen2.5:3b-instruct"
  # Path to the vocabulary file for tag/topic normalisation.
  # Leave commented out to skip normalisation.
  vocab_path: "C:/Users/YOUR_USERNAME/Documents/Obsidian Vault/Assistant/metadata.vocab.yml"
  # Extra frontmatter keys allowed in addition to the built-in schema.
  # extra_allowed_keys: []
  # When true, overwrite existing frontmatter values (full regeneration).
  force: false

# Assistant block settings (how the block is written into notes by `analyze`)
assistant_block:
  heading: "## Assistant"
  sections:
    - Summary
    - Questions
    - "Metadata suggestions"

# Embeddings settings (for embeddings build/update and ask --mode vector/hybrid)
embeddings:
  provider: ollama
  base_url: "http://127.0.0.1:11434"
  model: "nomic-embed-text"   # pull with: ollama pull nomic-embed-text
  batch_size: 32              # chunks embedded per Ollama call batch
  chunk_size: 1000            # max characters per chunk
  chunk_overlap: 200          # overlap characters between adjacent chunks

